<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkySwag - 3D Презентация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Space Grotesk', 'Arial', sans-serif;
        }
        
        #model-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        
        /* Эффект тумана по краям */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }
        
        /* Логотипы на колоннах */
        .logo-pillar {
            position: fixed;
            bottom: 50px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: rgba(212, 175, 55, 0.6);
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: monospace;
            z-index: 20;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        .logo-pillar.left {
            left: 20px;
        }
        
        .logo-pillar.right {
            right: 20px;
        }
        
        /* Панель управления */
        .controls-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.6);
            border-radius: 60px;
            padding: 12px 30px;
            display: flex;
            gap: 20px;
            z-index: 1000;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }
        
        .control-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #fff;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .control-btn:hover {
            background: #d4af37;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }
        
        .control-btn.rotate-active {
            background: #d4af37;
            color: #000;
        }
        
        .model-title {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #e31b23;
            border-right: 2px solid #d4af37;
            padding: 12px 25px;
            border-radius: 50px;
            color: #d4af37;
            font-size: 1.2rem;
            font-weight: 600;
            z-index: 1000;
            backdrop-filter: blur(5px);
            letter-spacing: 1px;
        }
        
        .close-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: #e31b23;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            transform: rotate(90deg);
            background: #d4af37;
            color: #000;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }
        
        .loading-spinner {
            text-align: center;
        }
        
        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid #d4af37;
            border-top-color: #e31b23;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        .loading-text {
            color: #d4af37;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .controls-panel { padding: 8px 15px; gap: 10px; width: 90%; justify-content: center; }
            .control-btn { padding: 6px 12px; font-size: 0.8rem; }
            .model-title { top: 20px; left: 20px; font-size: 0.9rem; padding: 8px 15px; }
            .close-btn { top: 20px; right: 20px; width: 40px; height: 40px; font-size: 1.5rem; }
            .logo-pillar { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="model-title" id="modelTitle">Загрузка...</div>
    <div class="close-btn" onclick="closeViewer()">✕</div>
    
    <div id="model-container"></div>
    
    <!-- Логотипы на колоннах -->
    <div class="logo-pillar left">SKY<br>SWAG</div>
    <div class="logo-pillar right">SKY<br>SWAG</div>
    
    <div class="vignette"></div>
    
    <div class="controls-panel">
        <button class="control-btn" onclick="toggleRotation()" id="rotateBtn">
            <span>🔄</span> Автовращение
        </button>
        <button class="control-btn" onclick="resetView()">
            <span>⟲</span> Сброс
        </button>
        <button class="control-btn" onclick="toggleFullscreen()">
            <span>⛶</span> На весь экран
        </button>
    </div>
    
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка 3D модели...</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        const urlParams = new URLSearchParams(window.location.search);
        const modelFile = urlParams.get('file') || 'helicopter.glb';
        const modelName = urlParams.get('name') || '3D Модель';
        document.getElementById('modelTitle').textContent = `🚁 ${decodeURIComponent(modelName)} | PREMIUM PRESENTATION`;
        
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        
        const container = document.getElementById('model-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 9);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.target.set(0, 1.5, 0);
        
        // ========== ПОДИУМ СЦЕНА ==========
        
        // Основная платформа
        const platformGeo = new THREE.CylinderGeometry(4.5, 4.5, 0.3, 64);
        const platformMat = new THREE.MeshStandardMaterial({
            color: 0x111122,
            metalness: 0.85,
            roughness: 0.25,
            emissive: 0x111122,
            emissiveIntensity: 0.2
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        platform.castShadow = true;
        platform.receiveShadow = true;
        scene.add(platform);
        
        // Светящееся кольцо на платформе
        const ringLightGeo = new THREE.TorusGeometry(4.2, 0.08, 128, 200);
        const ringLightMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, emissive: 0xd4af37, emissiveIntensity: 0.6 });
        const ringLight = new THREE.Mesh(ringLightGeo, ringLightMat);
        ringLight.rotation.x = Math.PI / 2;
        ringLight.position.y = 0.18;
        scene.add(ringLight);
        
        const ringLight2Geo = new THREE.TorusGeometry(3.8, 0.06, 128, 200);
        const ringLight2Mat = new THREE.MeshStandardMaterial({ color: 0xe31b23, emissive: 0xe31b23, emissiveIntensity: 0.5 });
        const ringLight2 = new THREE.Mesh(ringLight2Geo, ringLight2Mat);
        ringLight2.rotation.x = Math.PI / 2;
        ringLight2.position.y = 0.22;
        scene.add(ringLight2);
        
        // Вращающаяся платформа для вертолета
        const rotorPlatformGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.15, 32);
        const rotorPlatformMat = new THREE.MeshStandardMaterial({
            color: 0x222233,
            metalness: 0.7,
            roughness: 0.3,
            emissive: 0x331100,
            emissiveIntensity: 0.1
        });
        const rotorPlatform = new THREE.Mesh(rotorPlatformGeo, rotorPlatformMat);
        rotorPlatform.position.y = 0.25;
        rotorPlatform.castShadow = true;
        scene.add(rotorPlatform);
        
        // ========== ТРУБЫ С ОГНЕМ ==========
        const pillars = [];
        const fireEmitters = [];
        
        const pillarPositions = [
            { x: -5.5, z: -4, angle: 0 },
            { x: 5.5, z: -4, angle: 0 },
            { x: -5.5, z: 4, angle: 0 },
            { x: 5.5, z: 4, angle: 0 },
            { x: -6, z: 0, angle: 0 },
            { x: 6, z: 0, angle: 0 },
            { x: 0, z: -6, angle: 0 },
            { x: 0, z: 6, angle: 0 }
        ];
        
        pillarPositions.forEach(pos => {
            // Колонна
            const pillarGeo = new THREE.CylinderGeometry(0.6, 0.8, 3.5, 16);
            const pillarMat = new THREE.MeshStandardMaterial({
                color: 0x333344,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0x111122,
                emissiveIntensity: 0.1
            });
            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.set(pos.x, 1.8, pos.z);
            pillar.castShadow = true;
            scene.add(pillar);
            
            // Верхушка колонны с огнем
            const topGeo = new THREE.SphereGeometry(0.45, 16, 16);
            const topMat = new THREE.MeshStandardMaterial({
                color: 0xd4af37,
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0xd4af37,
                emissiveIntensity: 0.3
            });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(pos.x, 3.5, pos.z);
            top.castShadow = true;
            scene.add(top);
            
            pillars.push({ pillar, top, pos });
            
            // Эмиттер огня (частицы)
            const fireGroup = [];
            for (let i = 0; i < 15; i++) {
                const fireGeo = new THREE.SphereGeometry(0.12, 8, 8);
                const fireMat = new THREE.MeshStandardMaterial({
                    color: 0xff6600,
                    emissive: 0xff3300,
                    emissiveIntensity: 0.8
                });
                const fireParticle = new THREE.Mesh(fireGeo, fireMat);
                fireParticle.userData = {
                    offsetY: Math.random() * 2,
                    speed: 0.03 + Math.random() * 0.04,
                    angle: Math.random() * Math.PI * 2,
                    radius: 0.3 + Math.random() * 0.4
                };
                fireParticle.position.set(pos.x, 3.7, pos.z);
                scene.add(fireParticle);
                fireGroup.push(fireParticle);
            }
            fireEmitters.push(fireGroup);
        });
        
        // ========== RGB ПЛАВНО ПЕРЕЛИВАЮЩИЕСЯ ОГНИ ==========
        const rgbSpots = [];
        const spotPositions = [
            { x: -4, y: 2, z: -4, color: 0xff3333 },
            { x: 4, y: 2, z: -4, color: 0x33ff33 },
            { x: -4, y: 2, z: 4, color: 0x3333ff },
            { x: 4, y: 2, z: 4, color: 0xff33ff },
            { x: -5, y: 3, z: 0, color: 0xffaa33 },
            { x: 5, y: 3, z: 0, color: 0x33ffaa },
            { x: 0, y: 3, z: -5, color: 0xaa33ff },
            { x: 0, y: 3, z: 5, color: 0xff33aa }
        ];
        
        spotPositions.forEach(pos => {
            const spotLight = new THREE.SpotLight(pos.color, 0.8);
            spotLight.position.set(pos.x, pos.y, pos.z);
            spotLight.angle = 0.5;
            spotLight.penumbra = 0.5;
            spotLight.distance = 15;
            spotLight.castShadow = true;
            scene.add(spotLight);
            rgbSpots.push(spotLight);
        });
        
        // Дополнительные точечные огни для RGB эффекта
        const rgbPoints = [];
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const x = Math.cos(angle) * 5.5;
            const z = Math.sin(angle) * 5.5;
            const pointLight = new THREE.PointLight(0xff0000, 0.5);
            pointLight.position.set(x, 1.2, z);
            scene.add(pointLight);
            rgbPoints.push(pointLight);
        }
        
        // ========== ОСНОВНОЕ ОСВЕЩЕНИЕ ==========
        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(3, 8, 4);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0xd4af37, 0.6);
        backLight.position.set(0, 3, -5);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(-3, 2, 3);
        scene.add(fillLight);
        
        // ========== ДЫМ/ПАР ЭФФЕКТ ==========
        const smokeParticles = [];
        const smokeGeo = new THREE.SphereGeometry(0.15, 8, 8);
        
        for (let i = 0; i < 80; i++) {
            const smokeMat = new THREE.MeshStandardMaterial({
                color: 0x88aaff,
                emissive: 0x3366aa,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.4
            });
            const smoke = new THREE.Mesh(smokeGeo, smokeMat);
            smoke.userData = {
                speed: 0.01 + Math.random() * 0.02,
                angle: Math.random() * Math.PI * 2,
                radius: 3 + Math.random() * 4,
                yOffset: Math.random() * 3,
                floatSpeed: 0.5 + Math.random() * 1
            };
            scene.add(smoke);
            smokeParticles.push(smoke);
        }
        
        // ========== ЗАГРУЗКА МОДЕЛИ ВЕРТОЛЕТА ==========
        const loader = new GLTFLoader();
        const modelPath = `/assets/models/${modelFile}`;
        let helicopterModel = null;
        
        loader.load(
            modelPath,
            (gltf) => {
                helicopterModel = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(helicopterModel);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 3.0 / maxDim;
                helicopterModel.scale.setScalar(scale);
                helicopterModel.position.set(0, 0.55, 0);
                
                helicopterModel.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        if (node.material) {
                            if (Array.isArray(node.material)) {
                                node.material.forEach(mat => {
                                    mat.roughness = 0.3;
                                    mat.metalness = 0.7;
                                });
                            } else {
                                node.material.roughness = 0.3;
                                node.material.metalness = 0.7;
                            }
                        }
                    }
                });
                
                scene.add(helicopterModel);
                
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 500);
            },
            (xhr) => {
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                const loadingText = document.querySelector('.loading-text');
                if (loadingText) loadingText.textContent = `Загрузка: ${percent}%`;
            },
            (error) => {
                console.error('Ошибка:', error);
                const loading = document.getElementById('loading');
                loading.innerHTML = `
                    <div style="background:#1a1a1a; border:2px solid #e31b23; border-radius:20px; padding:2rem; text-align:center;">
                        <h2 style="color:#e31b23;">❌ Ошибка загрузки</h2>
                        <p style="color:#888;">Файл: <code style="color:#d4af37;">${modelFile}</code></p>
                        <button onclick="location.reload()" style="margin-top:1rem; padding:0.8rem 2rem; background:#d4af37; border:none; border-radius:30px;">🔄 Повторить</button>
                        <button onclick="window.location.href='catalog.html'" style="margin-left:1rem; padding:0.8rem 2rem; background:#e31b23; border:none; border-radius:30px;">◀ Назад</button>
                    </div>
                `;
            }
        );
        
        // ========== АНИМАЦИЯ ==========
        let time = 0;
        let rotorAngle = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Плавное вращение RGB огней
            rgbSpots.forEach((light, i) => {
                const hue = (time * 0.15 + i * 0.1) % 1;
                const color = new THREE.Color().setHSL(hue, 1, 0.5);
                light.color.set(color);
                light.intensity = 0.6 + Math.sin(time * 0.8 + i) * 0.3;
            });
            
            // Плавное вращение точечных RGB огней
            rgbPoints.forEach((light, i) => {
                const hue = (time * 0.2 + i * 0.15) % 1;
                const color = new THREE.Color().setHSL(hue, 1, 0.6);
                light.color.set(color);
                light.intensity = 0.4 + Math.sin(time * 1.2 + i) * 0.3;
            });
            
            // Анимация колец
            ringLight.rotation.z += 0.008;
            ringLight2.rotation.z -= 0.01;
            
            // Вращение платформы для вертолета
            rotorPlatform.rotation.y += 0.005;
            if (helicopterModel) {
                helicopterModel.rotation.y += 0.005;
            }
            
            // Анимация огня из колонн
            fireEmitters.forEach((emitter, idx) => {
                emitter.forEach((particle, pIdx) => {
                    const data = particle.userData;
                    data.offsetY += data.speed;
                    if (data.offsetY > 1.5) data.offsetY = 0;
                    
                    const offsetX = Math.sin(time * 5 + pIdx) * 0.1;
                    const offsetZ = Math.cos(time * 4 + pIdx) * 0.1;
                    particle.position.y = 3.7 + data.offsetY;
                    particle.position.x = pillars[idx].pos.x + offsetX;
                    particle.position.z = pillars[idx].pos.z + offsetZ;
                    
                    const intensity = 0.6 + Math.sin(time * 8 + pIdx) * 0.4;
                    particle.material.emissiveIntensity = intensity;
                    particle.material.color.setHSL(0.08, 1, 0.5);
                });
            });
            
            // Анимация дыма/пара
            smokeParticles.forEach((smoke, i) => {
                const data = smoke.userData;
                const angle = time * data.floatSpeed + data.angle;
                const x = Math.cos(angle) * data.radius;
                const z = Math.sin(angle) * data.radius;
                const y = 0.8 + Math.sin(time * 1.5 + i) * 0.3 + data.yOffset * 0.5;
                smoke.position.set(x, y, z);
                
                const scale = 0.8 + Math.sin(time * 2 + i) * 0.3;
                smoke.scale.set(scale, scale, scale);
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        window.toggleRotation = () => {
            controls.autoRotate = !controls.autoRotate;
            const btn = document.getElementById('rotateBtn');
            btn.classList.toggle('rotate-active', controls.autoRotate);
        };
        
        window.resetView = () => {
            camera.position.set(6, 4, 9);
            controls.target.set(0, 1.5, 0);
            controls.update();
        };
        
        window.toggleFullscreen = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        };
        
        window.closeViewer = () => {
            window.location.href = 'catalog.html';
        };
    </script>
</body>
</html>
